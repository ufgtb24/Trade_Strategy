big_yang:
  enabled: true
  sigma_threshold: 2.0
  volatility_lookback: 252
breakout:
  breakout_modes:
  - close
  detection_lookback_days: 126
  enabled: true
  exceed_threshold: 0.01
  min_relative_height: 0.2
  min_side_bars: 5
  peak_measure: high
  peak_supersede_threshold: 0.01
  total_window: 30
double_trough:
  enabled: true
  first_bounce_atr: 1.5            # TR1 反弹 >= N 倍 ATR（噪声下界 1.0，信噪比 4:1）
  min_tr2_depth_atr: 0.8           # TR2 回调 >= N 倍 ATR（与 bounce 比例 ~0.53）
  min_recovery_atr: 0.1            # TR2-TR1 >= N 倍 ATR（原 min_recovery_pct: 0.5%）
  atr_period: 14                   # ATR 计算周期
  max_gap_days: 60
  min_of: 126
  support_trough:
    min_side_bars: 2
    window: null
  tr1_measure: low
  tr2_measure: low
  bounce_high_measure: close
  trough:
    min_side_bars: 2
    window: 5
high_volume:
  enabled: true
  lookback_days: 126
  volume_ma_period: 60
  volume_multiplier: 10.0
support_analysis:
  breakout_tolerance_pct: 5.0
  enabled: true
  max_lookforward_days: 90
  trough_tolerance_pct: 5.0
