# Simple Pool MVP 配置
# 基于即时判断的观察池系统

# === 4 核心参数 ===

# 最大回调深度 (ATR单位)
# 超过此值不触发信号
max_pullback_atr: 1.5

# 支撑位参考天数
# 取近N天最低价作为支撑
support_lookback: 10

# 放量阈值 (相对于MA20)
# 当日成交量需达到MA20的此倍数
volume_threshold: 1.3

# 最小入池质量分 (0-100)
min_quality_score: 100.0

# === 固定参数 (一般不需要调整) ===

# 最大观察天数
max_observation_days: 30

# 成交量均线周期
volume_ma_period: 20

# 价格均线周期 (用于判断上涨)
price_ma_period: 5

# 放弃阈值倍数
# 回调超过 max_pullback_atr * abandon_buffer 则放弃
abandon_buffer: 1.5

# ATR 计算周期
atr_period: 14
