# Daily 池默认配置
# 版本: 1.0
# 说明: 基于阶段状态机的 Daily 级别观察池配置

global:
  max_observation_days: 30  # 总观察期最长天数
  keep_history: true        # 是否保留完整历史

# 阶段转换配置
phase:
  # INITIAL -> PULLBACK
  pullback_trigger_atr: 0.3  # 回调触发阈值（ATR单位）

  # PULLBACK -> CONSOLIDATION
  min_convergence_score: 0.5  # 最小波动收敛分数
  min_support_tests: 2        # 最小支撑测试次数

  # CONSOLIDATION -> REIGNITION
  min_volume_expansion: 1.5   # 最小放量倍数
  breakout_confirm_days: 1    # 突破确认天数

  # 失败条件
  max_drop_from_breakout_atr: 1.5  # 最大回调深度（ATR单位）
  support_break_buffer_atr: 0.5    # 支撑破位缓冲（ATR单位）
  max_pullback_days: 15            # 回调阶段最长天数
  max_consolidation_days: 20       # 企稳阶段最长天数

# 价格模式分析配置
price_pattern:
  support_detection:
    min_touches: 2              # 最小触及次数
    touch_tolerance_atr: 0.1    # 触及容差（ATR单位）
    local_min_window: 2         # 局部最低点检测窗口
  consolidation:
    window: 10                  # 企稳区间计算窗口（天）
    max_width_atr: 2.0          # 最大区间宽度（ATR单位）

# 波动率分析配置
volatility:
  atr_period: 14              # ATR计算周期
  lookback_days: 20           # 收敛分析回看天数
  contraction_threshold: 0.8  # 收缩判定阈值（当前ATR/初始ATR）

# 成交量分析配置
volume:
  baseline_period: 20         # 基准量计算周期
  expansion_threshold: 1.5    # 放量判定阈值

# 信号生成配置
signal:
  confidence_weights:
    convergence: 0.30  # 波动收敛权重
    support: 0.25      # 支撑强度权重
    volume: 0.25       # 放量程度权重
    quality: 0.20      # 突破质量权重
  position_sizing:
    strong: 0.15   # 强信号仓位
    normal: 0.10   # 普通信号仓位
    weak: 0.05     # 弱信号仓位
